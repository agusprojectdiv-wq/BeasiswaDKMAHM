                const snap = await db.collection('siswa').limit(1).get();
                if (snap.empty && databaseSiswa.length > 0) {
                    const { _docId, ...seedData } = databaseSiswa[0];
                    await db.collection('siswa').add(seedData);
                }
                const snapMentor = await db.collection('mentor').limit(1).get();
                if (snapMentor.empty && databaseMentor.length > 0) {
                    for (const m of databaseMentor) {
                        const { _docId, ...seedData } = m;
                        await db.collection('mentor').add(seedData);
                    }
                }
            } catch (err) {
                console.error('[Firebase] Gagal melakukan seeding data awal:', err);
            }
        }

        // Listener real-time: setiap perubahan di Firestore langsung tersinkron ke semua pengguna
        function initFirestoreListeners() {
            if (!firebaseReady) return;

            db.collection('siswa').onSnapshot(snapshot => {
                databaseSiswa = snapshot.docs.map(doc => ({ _docId: doc.id, ...doc.data() }));
                renderSiswaTable();
                renderProfilPenerimaList();
                if (currentView === 'perkembangan-anak') generatePerkembanganTables();
                if (currentView === 'perkembangan-ortu') generatePerkembanganOrtuTables();
                if (currentView === 'dashboard' && dashboardChartsInitialized) { renderEdukasiRutinChart(); renderTopHafalan(); }
            }, err => console.error('[Firebase] Gagal memuat data siswa:', err));

            db.collection('mentor').onSnapshot(snapshot => {
                databaseMentor = snapshot.docs.map(doc => ({ _docId: doc.id, ...doc.data() }));
                if (currentView === 'data-mentor') { generateMentorTable(); generateMentorRekap(); }
            }, err => console.error('[Firebase] Gagal memuat data mentor:', err));
        }

        // Simpan (tambah/edit) data siswa — otomatis ke Firestore jika terhubung, atau ke array lokal jika belum
        async function saveSiswaToDB(dataObj, docId = null) {
            if (firebaseReady) {
                if (docId) {
                    await db.collection('siswa').doc(docId).set(dataObj, { merge: true });
                } else {
                    await db.collection('siswa').add(dataObj);
                }
                // Tabel akan otomatis ter-refresh melalui onSnapshot listener
            } else {
                if (docId) {
                    const idx = databaseSiswa.findIndex(s => s._docId === docId);
                    if (idx > -1) databaseSiswa[idx] = { ...databaseSiswa[idx], ...dataObj };
                } else {
                    databaseSiswa.push({ _docId: 'local-' + Date.now(), ...dataObj });
                }
                renderSiswaTable();
                renderProfilPenerimaList();
            }
        }

        // Hapus data siswa — otomatis ke Firestore jika terhubung, atau ke array lokal jika belum
        async function deleteSiswaFromDB(docId) {
            if (firebaseReady) {

            } else {
                databaseSiswa = databaseSiswa.filter(s => s._docId !== docId);

            }

        // Render / update grafik batang kehadiran pembinaan per kota sesuai periode terpilih
        function renderKehadiranChart() {
            const idxDari = parseInt(document.getElementById('kehadiran-bulan-dari').value);
            const idxSampai = parseInt(document.getElementById('kehadiran-bulan-sampai').value);
            const canvas = document.getElementById('kehadiranPembinaanChart');
            if (!canvas) return;

            let dari = idxDari, sampai = idxSampai;
            if (isNaN(dari)) dari = 0;
            if (isNaN(sampai)) sampai = bulanList.length - 1;
            if (dari > sampai) { const t = dari; dari = sampai; sampai = t; }

            const labels = currentUser && currentUser.role === 'mentor-wilayah'
                ? Object.keys(kehadiranPerKota).filter(k => k === currentUser.wilayah)
                : Object.keys(kehadiranPerKota);
            const dataHadir = [];
            const dataTidakHadir = [];

            labels.forEach(kota => {
                let hadir = 0, tidak = 0;
                for (let i = dari; i <= sampai; i++) {
                    hadir += kehadiranPerKota[kota][i][0];
                    tidak += kehadiranPerKota[kota][i][1];
                }
                dataHadir.push(hadir);
                dataTidakHadir.push(tidak);
            });

            if (kehadiranChartInstance) kehadiranChartInstance.destroy();
            kehadiranChartInstance = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Hadir', data: dataHadir, backgroundColor: '#10b981', borderRadius: 6 },
                        { label: 'Tidak Hadir', data: dataTidakHadir, backgroundColor: '#f43f5e', borderRadius: 6 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } },
                    scales: {
                        x: { ticks: { font: { size: 10 } }, grid: { display: false } },
                        y: { beginAtZero: true, ticks: { font: { size: 10 } } }
                    }
                }
            });
        }

        // Render daftar Top 10 Hafalan Terbanyak sebagai diagram batang horizontal dengan foto bulat di ujung
        function renderTopHafalan() {
            const container = document.getElementById('top-hafalan-list');
            if (!container) return;
            container.innerHTML = '';

            const sourceData = currentUser && currentUser.role === 'mentor-wilayah'
                ? topHafalanData.filter(d => d.wilayah === currentUser.wilayah)
                : topHafalanData;

            if (sourceData.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 italic text-center py-6">Belum ada data hafalan untuk wilayah ini.</p>`;
                return;
            }

            const sorted = [...sourceData].sort((a, b) => b.juz - a.juz).slice(0, 10);
            const maxJuz = sorted[0].juz;

            sorted.forEach((item, idx) => {
                const persen = (item.juz / maxJuz) * 100;
                const row = document.createElement('div');
                row.className = 'flex items-center gap-2';
                row.innerHTML = `
                    <span class="text-[10px] font-bold text-slate-400 w-4 text-right">${idx + 1}</span>

                        <div class="flex-1 bg-slate-100 rounded-full h-4 relative overflow-visible">

        async function simpanPerkembanganAnak() {
            const rekap = getVisibleSiswa().map((siswa) => {
                const index = databaseSiswa.indexOf(siswa);
                let kehadiran = '-';
                document.getElementsByName(`absen-${index}`).forEach(r => { if (r.checked) kehadiran = r.value; });

                    setoranAyat: document.getElementById(`hafalan-setoran-ayat-${index}`)?.value || '',
                    sampaiSurat: document.getElementById(`hafalan-sampai-surat-${index}`)?.value || '',
                    sampaiAyat: document.getElementById(`hafalan-sampai-ayat-${index}`)?.value || ''
                };
            });

            const sesi = {
                cabang: document.getElementById('pa-cabang')?.value || '-',
                tanggal: document.getElementById('pa-tanggal')?.value || '-',

                materi: document.getElementById('pa-materi')?.value || '-',
                pemateri: document.getElementById('pa-pemateri')?.value || '-',
                rekap
            };

            const el = document.getElementById(sectionId);
            const txt = document.getElementById(`txt-${sectionId}`);

            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');

                optSampai.value = index;
                optSampai.text = `${index + 1}. ${s.nama}`;
                sampaiSelect.add(optSampai);
            });
        }

        // Kalkulasi perhitungan Juz atau bagian dari Juz yang sedang dihafal secara otomatis
        // Acuan: Al-Fatihah = Juz 1 (awal Al-Qur'an), An-Naba = Juz 30 (awal Juz 'Amma / Juz terakhir)
        // sesuai pembagian Mushaf Standar Madinah (1 Juz rata-rata 20 halaman).
        function hitungJuzOtomatis() {
            const dariVal = document.getElementById('assess-surat-dari').value;
            const sampaiVal = document.getElementById('assess-surat-sampai').value;
            const outputText = document.getElementById('output-estimasi-juz');

            if (dariVal === "" || sampaiVal === "") {
                outputText.innerText = "0 Juz";
                return;
            }

            const idxDari = parseInt(dariVal);
            const idxSampai = parseInt(sampaiVal);

            if (idxDari > idxSampai) {
                outputText.innerText = "Error: Urutan surat terbalik";
                return;
            }

            const juzDari = listSurat[idxDari].juz;     // Al-Fatihah -> 1
            const juzSampai = listSurat[idxSampai].juz; // An-Naba -> 30

            // Menghitung estimasi total halaman dari rentang surat pilihan
            let totalHalaman = 0;
            for (let i = idxDari; i <= idxSampai; i++) {
                totalHalaman += listSurat[i].hal;
            }

            // Standar Mushaf Ustmani Madinah: 1 Juz = 20 halaman, 604 halaman = 30 Juz
            const hitungJuz = totalHalaman / 20;

            if (juzDari === juzSampai) {
                // Rentang hafalan masih berada di dalam 1 Juz yang sama
                if (hitungJuz >= 1) {
                    outputText.innerText = `Khatam Juz ${juzDari}`;
                } else {
                    const persentaseJuz = (hitungJuz * 100).toFixed(0);
                    outputText.innerText = `${persentaseJuz}% dari Juz ${juzDari}`;
                }
            } else if (hitungJuz >= 30) {
                outputText.innerText = "Khatam (30 Juz)";
            } else {
                // Tampilkan estimasi jumlah Juz sekaligus rentang Juz cakupannya
                outputText.innerText = `≈ ${hitungJuz.toFixed(1)} Juz (Juz ${juzDari} s.d Juz ${juzSampai})`;
            }
        }

        // Modal Wizard Logic
        function openModal() {
            editingSiswaDocId = null;
            document.getElementById('inputModal').classList.remove('hidden');
            document.getElementById('inputModal').classList.add('flex');
            document.getElementById('modal-form-title').innerText = 'Form Registrasi Anak Baru';
            document.getElementById('btnHapus').classList.add('hidden');
            document.getElementById('siswaForm').reset();
            document.getElementById('preview-foto-siswa').innerHTML = '<i class="fa-solid fa-user text-slate-300 text-2xl"></i>';

            // Set ID beasiswa baru secara dinamis, format: RZ-2026-XXX
            const nextId = databaseSiswa.length + 1;
            document.getElementById('in-id-beasiswa').value = `RZ-2026-${String(nextId).padStart(3, '0')}`;
            
            currentStep = 1; 
            showStep(currentStep);
            initAssessSuratOptions(); // Load list surat
        }

        // Membuka modal dalam mode edit, mengisi ulang data siswa yang sudah tersimpan (berdasarkan docId Firestore)
        function editSiswa(docId) {
            const s = databaseSiswa.find(x => x._docId === docId);
            if (!s) return;
            editingSiswaDocId = docId;

            document.getElementById('inputModal').classList.remove('hidden');
            document.getElementById('inputModal').classList.add('flex');
            document.getElementById('modal-form-title').innerText = `Edit Data: ${s.nama}`;
            document.getElementById('btnHapus').classList.remove('hidden');

            document.getElementById('in-id-beasiswa').value = s.id;
            document.getElementById('in-nama-siswa').value = s.nama;
            document.getElementById('in-mentor').value = s.mentor;
            document.getElementById('in-sekolah').value = s.sekolah;
            document.getElementById('in-wilayah').value = s.wilayah;
            document.getElementById('in-kelas').value = s.kelas;
            document.getElementById('in-status-beasiswa').value = s.statusBeasiswa || 'Aktif';
            document.getElementById('preview-foto-siswa').innerHTML = s.foto ? `<img src="${s.foto}" class="w-full h-full object-cover">` : '<i class="fa-solid fa-user text-slate-300 text-2xl"></i>';

            currentStep = 1;
            showStep(currentStep);
            initAssessSuratOptions();
            if (document.getElementById('assess-status-edukasi')) {
                document.getElementById('assess-status-edukasi').value = s.statusEdukasi || 'Belum';
            }
            if (document.getElementById('assess-jenjang-hafalan')) {
                document.getElementById('assess-jenjang-hafalan').value = s.jenjangHafalan || '';
            }
        }

        // Menghapus data siswa yang sedang diedit dari dalam modal (langsung ke Firestore jika terhubung)
        async function hapusSiswaDariModal() {
            if (!editingSiswaDocId) return;
            const s = databaseSiswa.find(x => x._docId === editingSiswaDocId);
            if (!s) return;
            if (!confirm(`Yakin ingin menghapus data "${s.nama}"? Tindakan ini tidak dapat dibatalkan.`)) return;

            await deleteSiswaFromDB(editingSiswaDocId);
            alert('Data siswa berhasil dihapus dari sistem.');
            closeModal();
        }

        function closeModal() {
            document.getElementById('inputModal').classList.add('hidden');
            document.getElementById('inputModal').classList.remove('flex');
            editingSiswaDocId = null;
        }

        function showStep(step) {
            document.querySelectorAll('.form-step').forEach((el, idx) => el.classList.toggle('hidden', idx !== (step - 1)));
            
            // Manage Tab Indicators
            for (let i = 1; i <= 4; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if (i === step) tab.className = "flex-1 pb-3 text-center text-xs font-bold border-b-2 border-custom-orange text-custom-orange";
                else tab.className = "flex-1 pb-3 text-center text-xs font-bold border-b-2 border-transparent text-slate-400";
            }
            
            document.getElementById('btnPrev').classList.toggle('invisible', step === 1);
            document.getElementById('btnNext').innerText = step === 4 ? (editingSiswaDocId ? 'Simpan Perubahan' : 'Simpan Data') : 'Lanjut';
        }

        async function changeStep(n) {
            if (n === 1 && currentStep === 4) {
                // Simpan Data (Baru atau Hasil Edit) dari modal form ke database
                const customId = document.getElementById('in-id-beasiswa').value;
                const nama = document.getElementById('in-nama-siswa').value || 'Siswa Baru';
                const mentor = document.getElementById('in-mentor').value || 'Budi Santoso';
                const sekolah = document.getElementById('in-sekolah').value || 'SMA Negeri Terpadu';
                const wilayah = document.getElementById('in-wilayah').value || 'Jakarta';
                const kelas = document.getElementById('in-kelas').value || 'XI';
                const statusEdukasi = document.getElementById('assess-status-edukasi').value || 'Belum';
                const statusBeasiswa = document.getElementById('in-status-beasiswa').value || 'Aktif';
                const jenjangHafalan = document.getElementById('assess-jenjang-hafalan')?.value || '';
                const previewImgSiswa = document.querySelector('#preview-foto-siswa img');
                const fotoSiswa = previewImgSiswa ? previewImgSiswa.src : 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=200';

                const btnNext = document.getElementById('btnNext');
                btnNext.disabled = true;
                btnNext.innerText = 'Menyimpan...';

                try {
                    if (editingSiswaDocId) {
                        // Mode Edit: perbarui data yang sudah ada
                        await saveSiswaToDB({
                            id: customId, nama, mentor, sekolah, wilayah, kelas,
                            statusEdukasi, statusBeasiswa, jenjangHafalan, foto: fotoSiswa
                        }, editingSiswaDocId);
                        alert('Perubahan data siswa berhasil disimpan!' + (firebaseReady ? ' (Tersinkron ke database real-time)' : ''));
                    } else {
                        // Mode Tambah Baru
                        await saveSiswaToDB({
                            id: customId, nama, mentor, sekolah, wilayah, kelas,
                            gender: 'Perempuan', healthScore: 85,
                            statusEdukasi, statusBeasiswa, jenjangHafalan, foto: fotoSiswa, hasDetail: false
                        });
                        alert('Data anak asuh baru beserta hasil assessment awal berhasil disimpan!' + (firebaseReady ? ' (Tersinkron ke database real-time)' : ''));
                    }
                } catch (err) {
                    console.error('[Firebase] Gagal menyimpan data siswa:', err);
                    alert('Gagal menyimpan data ke database. Periksa koneksi Firebase Anda.');
                } finally {
                    btnNext.disabled = false;
                }

                closeModal();
                document.getElementById('siswaForm').reset();
                document.getElementById('usiaDisplay').value = '';
                document.getElementById('output-estimasi-juz').innerText = '0 Juz';
                document.getElementById('preview-foto-siswa').innerHTML = '<i class="fa-solid fa-user text-slate-300 text-2xl"></i>';
                return;
            }
            currentStep += n; showStep(currentStep);
        }

        // Perhitungan Usia Otomatis
        function hitungUsia() {
            const val = document.getElementById('tglLahir').value;
            if (!val) return;
            const birth = new Date(val);
            const now = new Date();
            let age = now.getFullYear() - birth.getFullYear();
            let m = now.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age--;
            document.getElementById('usiaDisplay').value = age + " Tahun";
        }

            new Chart(document.getElementById('academicChartDetail').getContext('2d'), {
                type: 'line',
                data: {
                    labels: ['Smt 1 2024', 'Smt 2 2024', 'Smt 1 2025', 'Smt 2 2025'],
                    datasets: [{
                        label: 'Nilai Rata-rata', data: [78, 81, 84, 86.7],
                        borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.05)',

                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            new Chart(document.getElementById('hafalanChartDetail').getContext('2d'), {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun'],
                    datasets: [
                        { label: 'Target', data: [3.5, 3.8, 4.0, 4.2, 4.5, 5.0], borderColor: '#94a3b8', borderDash: [5, 5], fill: false },
                        { label: 'Capaian Nyata', data: [3.2, 3.5, 3.8, 4.0, 4.4, 4.8], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.05)', borderWidth: 3, fill: true }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
